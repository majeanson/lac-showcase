<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FirstProjectExample — LAC Wiki</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #12100e;
        --bg-sidebar: #0e0c0a;
        --bg-card: #1a1714;
        --bg-hover: #201d1a;
        --bg-active: #251f18;
        --border: #2a2420;
        --border-soft: #221e1b;
        --text: #e8ddd4;
        --text-mid: #b0a49c;
        --text-soft: #7a6a5a;
        --accent: #c4a255;
        --accent-warm: #e8b865;
        --mono:
          "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
        --sans:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

        --status-active: #4aad72;
        --status-draft: #c4a255;
        --status-frozen: #5b82cc;
        --status-deprecated: #cc5b5b;

        --status-active-bg: rgba(74, 173, 114, 0.12);
        --status-draft-bg: rgba(196, 162, 85, 0.12);
        --status-frozen-bg: rgba(91, 130, 204, 0.12);
        --status-deprecated-bg: rgba(204, 91, 91, 0.12);
      }

      html,
      body {
        height: 100%;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
      }

      /* ── Shell ──────────────────────────────────────────────── */

      .shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .topbar {
        flex-shrink: 0;
        height: 44px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        background: var(--bg-sidebar);
        border-bottom: 1px solid var(--border);
      }
      .topbar-logo {
        font-family: var(--mono);
        font-size: 13px;
        color: var(--accent);
        letter-spacing: 0.05em;
      }
      .topbar-sep {
        color: var(--border);
      }
      .topbar-project {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text-mid);
      }
      .topbar-count {
        margin-left: auto;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-soft);
      }

      .body-row {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* ── Sidebar ────────────────────────────────────────────── */

      .sidebar {
        width: 264px;
        flex-shrink: 0;
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .sidebar-search {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .sidebar-search input {
        width: 100%;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 6px 10px;
        font-family: var(--mono);
        font-size: 12px;
        color: var(--text);
        outline: none;
      }
      .sidebar-search input:focus {
        border-color: var(--accent);
      }
      .sidebar-search input::placeholder {
        color: var(--text-soft);
      }

      .nav-tree {
        flex: 1;
        overflow-y: auto;
        padding: 6px 0 24px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .nav-tree::-webkit-scrollbar {
        width: 4px;
      }
      .nav-tree::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* Domain group */
      .nav-group {
        margin-bottom: 2px;
      }

      .nav-domain {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px 4px;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-soft);
        cursor: pointer;
        user-select: none;
      }
      .nav-domain:hover {
        color: var(--text-mid);
      }
      .nav-domain-arrow {
        transition: transform 0.15s;
        font-size: 8px;
      }
      .nav-domain.collapsed .nav-domain-arrow {
        transform: rotate(-90deg);
      }
      .nav-domain-count {
        margin-left: auto;
        font-size: 10px;
        opacity: 0.6;
      }

      .nav-group-items {
        overflow: hidden;
      }
      .nav-group.collapsed .nav-group-items {
        display: none;
      }

      /* Feature item */
      .nav-item {
        display: flex;
        align-items: baseline;
        gap: 7px;
        padding: 5px 14px 5px 18px;
        cursor: pointer;
        user-select: none;
        border-left: 2px solid transparent;
        transition: background 0.1s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: var(--bg-hover);
      }
      .nav-item.active {
        background: var(--bg-active);
        border-left-color: var(--accent);
      }
      .nav-item[data-depth="1"] {
        padding-left: 30px;
      }
      .nav-item[data-depth="2"] {
        padding-left: 42px;
      }
      .nav-item[data-depth="3"] {
        padding-left: 54px;
      }

      .nav-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .nav-item[data-status="active"] .nav-dot {
        background: var(--status-active);
      }
      .nav-item[data-status="draft"] .nav-dot {
        background: var(--status-draft);
      }
      .nav-item[data-status="frozen"] .nav-dot {
        background: var(--status-frozen);
      }
      .nav-item[data-status="deprecated"] .nav-dot {
        background: var(--status-deprecated);
        opacity: 0.5;
      }

      .nav-item-key {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-soft);
        flex-shrink: 0;
      }
      .nav-item-title {
        font-size: 12px;
        color: var(--text-mid);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
        min-width: 0;
      }
      .nav-item:hover .nav-item-title,
      .nav-item.active .nav-item-title {
        color: var(--text);
      }
      .nav-item.active .nav-item-key {
        color: var(--accent);
      }

      .nav-child-arrow {
        font-size: 9px;
        color: var(--text-soft);
        flex-shrink: 0;
        opacity: 0.5;
      }

      /* ── Content ────────────────────────────────────────────── */

      .content {
        flex: 1;
        min-width: 0;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      .content::-webkit-scrollbar {
        width: 6px;
      }
      .content::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }

      /* Home / welcome */
      .home-page {
        max-width: 680px;
        margin: 0 auto;
        padding: 56px 40px 80px;
      }
      .home-eyebrow {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 16px;
      }
      .home-title {
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 8px;
        line-height: 1.2;
      }
      .home-subtitle {
        font-size: 14px;
        color: var(--text-mid);
        margin-bottom: 40px;
      }

      .stat-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 40px;
      }
      .stat-pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 12px;
      }
      .stat-pill-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .stat-pill-num {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }
      .stat-pill-label {
        color: var(--text-soft);
      }

      .home-section-title {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-soft);
        margin-bottom: 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }

      .domain-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 40px;
      }
      .domain-chip {
        padding: 4px 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 100px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-mid);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      .domain-chip:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Feature page */
      .feature-page {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 40px 80px;
      }

      .feature-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .feature-key {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-soft);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
      }
      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .badge-active {
        color: var(--status-active);
        background: var(--status-active-bg);
        border: 1px solid rgba(74, 173, 114, 0.25);
      }
      .badge-draft {
        color: var(--status-draft);
        background: var(--status-draft-bg);
        border: 1px solid rgba(196, 162, 85, 0.25);
      }
      .badge-frozen {
        color: var(--status-frozen);
        background: var(--status-frozen-bg);
        border: 1px solid rgba(91, 130, 204, 0.25);
      }
      .badge-deprecated {
        color: var(--status-deprecated);
        background: var(--status-deprecated-bg);
        border: 1px solid rgba(204, 91, 91, 0.25);
      }

      .badge-domain {
        color: var(--text-mid);
        background: var(--bg-card);
        border: 1px solid var(--border);
      }

      .feature-title {
        font-size: 26px;
        font-weight: 700;
        color: var(--text);
        line-height: 1.25;
        margin-bottom: 6px;
      }
      .feature-completeness {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-soft);
        margin-bottom: 32px;
      }
      .completeness-bar {
        display: inline-block;
        width: 80px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        vertical-align: middle;
        margin-right: 6px;
        position: relative;
        top: -1px;
        overflow: hidden;
      }
      .completeness-fill {
        height: 100%;
        border-radius: 2px;
        background: var(--accent);
      }

      /* Sections */
      .section {
        margin-bottom: 36px;
      }

      .section-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }
      .section-label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-soft);
      }
      .section-count {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--border);
      }

      .section-body p {
        color: var(--text-mid);
        line-height: 1.75;
        margin-bottom: 10px;
      }
      .section-body p:last-child {
        margin-bottom: 0;
      }
      .section-body strong {
        color: var(--text);
      }
      .section-body code {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--accent);
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 5px;
      }
      .section-body ul {
        padding-left: 20px;
        color: var(--text-mid);
      }
      .section-body li {
        margin-bottom: 4px;
        line-height: 1.6;
      }

      /* Decision cards */
      .decisions-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .decision-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        border-radius: 4px;
        padding: 14px 16px;
      }
      .decision-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .decision-rationale {
        font-size: 13px;
        color: var(--text-mid);
        line-height: 1.65;
        margin-bottom: 8px;
      }
      .decision-meta {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .decision-date {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-soft);
      }
      .decision-alts {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-soft);
      }

      /* Limitations list */
      .limitations-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .limitation-item {
        display: flex;
        gap: 10px;
        padding: 8px 12px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 13px;
        color: var(--text-mid);
        line-height: 1.55;
      }
      .limitation-bullet {
        color: var(--text-soft);
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* Tags row */
      .tags-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .tag {
        padding: 3px 9px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 100px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-soft);
      }

      /* Lineage */
      .lineage-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .lineage-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 4px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--text-mid);
        cursor: pointer;
        transition:
          border-color 0.15s,
          color 0.15s;
        text-decoration: none;
      }
      .lineage-link:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .lineage-arrow {
        color: var(--text-soft);
        font-size: 10px;
      }

      /* Empty states */
      .empty {
        color: var(--text-soft);
        font-size: 13px;
        font-style: italic;
      }

      /* No results */
      .no-results {
        padding: 24px 18px;
        font-size: 12px;
        color: var(--text-soft);
        text-align: center;
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <span class="topbar-logo">◈ lac</span>
        <span class="topbar-sep">|</span>
        <span class="topbar-project">FirstProjectExample</span>
        <span class="topbar-count">27 features · 15 domains</span>
      </div>
      <div class="body-row">
        <aside class="sidebar">
          <div class="sidebar-search">
            <input
              type="text"
              id="filter-input"
              placeholder="Filter features…"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
          <nav class="nav-tree" id="nav-tree"></nav>
        </aside>
        <main class="content" id="content"></main>
      </div>
    </div>

    <script>
      const FEATURES = [
        {
          featureKey: "feat-2026-001",
          title: "Why I Built This",
          status: "frozen",
          problem:
            "Developers build things for reasons that get lost — this app makes the reasoning visible by capturing problem, decisions, and learnings per project entry.",
          schemaVersion: 1,
          analysis:
            "A self-documenting portfolio where the repo's own feature.json files are the data source, making build process and content inseparable. Every decision made while building the app is also visible inside the app.",
          decisions: [
            {
              decision: "React for the UI layer",
              rationale:
                "Component model maps naturally to feature cards and is easy to iterate on visuals without a full framework.",
              alternativesConsidered: [
                "Plain HTML/CSS — less composable",
                "Next.js — overkill for static portfolio",
              ],
              date: "2026-03-21",
            },
            {
              decision: "feature.json files in the repo as the data source",
              rationale:
                "The project is self-describing — no CMS, no database, provenance lives alongside the code it documents.",
              alternativesConsidered: [
                "Hardcoded entries — defeats the purpose",
                "External CMS — separates content from context",
              ],
              date: "2026-03-21",
            },
            {
              decision:
                "Iterative feature spawning — root feature first, children added as the project grows",
              rationale:
                "Mirrors real-world software development where each child feature is a new slice of work with its own context.",
              alternativesConsidered: [
                "Plan all features upfront — premature, hides iterative nature",
              ],
              date: "2026-03-21",
            },
            {
              decision:
                "Root feature frozen once all designed features are implemented and visible in the running app",
              rationale:
                "The showcase is complete — 22 features spanning the full LAC ecosystem, all visible in the app that documents them, closing the recursive loop.",
              alternativesConsidered: [],
              date: "2026-03-21",
            },
          ],
          implementation:
            "The root feature.json acts as the entry point for the entire feature tree with no parent and no dedicated source file. The Vite app discovers it via import.meta.glob alongside all child feature.json files, rendering the same decision records that describe how it was built.",
          knownLimitations: [
            "No automated completeness check — empty fields render without warning",
          ],
          tags: [
            "react",
            "portfolio",
            "life-as-code",
            "self-documenting",
            "provenance",
          ],
          lineage: {
            children: [
              "feat-2026-002",
              "feat-2026-004",
              "feat-2026-022",
              "feat-2026-023",
            ],
          },
          successCriteria:
            "The app runs with `bun run dev`, renders the root feature card at depth 0 with problem/decisions/analysis visible, and all child features appear indented beneath it.",
          domain: "portfolio",
          priority: 1,
        },
        {
          featureKey: "feat-2026-004",
          title: "What is Life-as-Code",
          status: "frozen",
          problem:
            "Visitors see a portfolio of features but have no context for what life-as-code is or why it matters.",
          schemaVersion: 1,
          analysis:
            "A short explainer section rendered above the feature list, explaining that LAC treats provenance as a first-class artifact — a feature.json living next to the code it describes. Links to the LAC CLI for visitors who want to adopt the workflow.",
          decisions: [
            {
              decision:
                "Inline section in the single-page layout rather than a separate /about route",
              rationale:
                "The explainer is short enough that routing adds friction — scrolling into the features is the natural reading flow.",
              alternativesConsidered: [
                "Separate /about page — breaks single-page reading",
                "Modal or popover — hides content from skimmers",
              ],
              date: "2026-03-21",
            },
            {
              decision:
                "About component imported into App.tsx above the feature list",
              rationale:
                "Visitors read the explanation before encountering the features it describes.",
              alternativesConsidered: [
                "Below the feature list — too late; visitors hit cards before understanding them",
              ],
              date: "2026-03-21",
            },
            {
              decision:
                "about-section styled with accent left-border matching the design system",
              rationale:
                "Visually distinguishes the explainer from feature cards while staying within the same token vocabulary.",
              alternativesConsidered: [
                "Plain prose, no border — loses visual separation from feature list",
              ],
              date: "2026-03-21",
            },
          ],
          implementation:
            "About.tsx is a purely presentational React component with no props or data fetching, rendered as a <section> above the feature list using about-label/about-body layout. All styles use BEM-style class names referencing CSS custom properties from feat-2026-003. Two external links open in a new tab with rel=noreferrer.",
          knownLimitations: [
            "External links are hardcoded — URL changes require a code edit",
            "No i18n support — all copy is English-only JSX",
            "No custom focus indicator on .about-link beyond browser defaults",
          ],
          tags: ["about", "explainer", "lac", "onboarding"],
          lineage: {
            parent: "feat-2026-001",
            children: ["feat-2026-006"],
            spawnReason:
              "The root feature needs to explain its own context to visitors who don't know what LAC is.",
          },
          successCriteria:
            "The explainer section renders above the feature list on page load, uses the app's design tokens, and both external links open the correct destinations in a new tab.",
          domain: "content",
          priority: 2,
        },
        {
          featureKey: "feat-2026-003",
          title: "Visual Design System",
          status: "frozen",
          problem:
            "The app needs a cohesive visual language — typography, color, spacing — that feels like a technical journal, not a generic dev tool.",
          schemaVersion: 1,
          analysis:
            "Warm archival aesthetic: cream background (#F2EDE3), rust accent (#7C3217), dark brown text (#1C1714), with three font roles — Playfair Display (headers), Lora (body), JetBrains Mono (keys/badges). All tokens live in CSS custom properties on :root, making them trivially overridable.",
          decisions: [
            {
              decision: "Warm archival palette over dark-mode dev aesthetic",
              rationale:
                "The content is about reasoning — it deserves a reading experience like a well-designed technical journal, not a code editor.",
              alternativesConsidered: [
                "Dark mode terminal — too expected",
                "Minimal white — sterile, forgettable",
              ],
              date: "2026-03-21",
            },
            {
              decision: "Playfair Display + Lora + JetBrains Mono type trio",
              rationale:
                "Playfair anchors titles editorially, Lora gives body text warmth, and JetBrains Mono gives technical elements precision without feeling cold.",
              alternativesConsidered: [
                "Inter or system fonts — generic, no character",
                "All-serif — loses technical contrast",
              ],
              date: "2026-03-21",
            },
            {

      // ── Helpers ──────────────────────────────────────────────────────────────────

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function md(text) {
        if (!text) return "";
        const lines = esc(text).split("\n");
        const out = [];
        let inList = false;
        for (const line of lines) {
          const t = line.trim();
          if (t.match(/^[-*] /)) {
            if (!inList) {
              out.push("<ul>");
              inList = true;
            }
            out.push("<li>" + inline(t.slice(2)) + "</li>");
          } else {
            if (inList) {
              out.push("</ul>");
              inList = false;
            }
            out.push(line);
          }
        }
        if (inList) out.push("</ul>");
        return out
          .join("\n")
          .split(/\n{2,}/)
          .map((block) => {
            const b = block.trim();
            if (!b) return "";
            if (b.startsWith("<ul>") || b.startsWith("<li>")) return b;
            return "<p>" + inline(b.replace(/\n/g, "<br>")) + "</p>";
          })
          .filter(Boolean)
          .join("\n");
      }

      function inline(s) {
        return s
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`\n]+)`/g, "<code>$1</code>");
      }

      function completeness(f) {
        const checks = [
          !!f.analysis,
          !!f.implementation,
          !!(f.decisions && f.decisions.length),
          !!f.successCriteria,
          !!(f.knownLimitations && f.knownLimitations.length),
          !!(f.tags && f.tags.length),
          !!f.domain,
        ];
        return Math.round(
          (checks.filter(Boolean).length / checks.length) * 100,
        );
      }

      function statusColor(s) {
        return (
          {
            active: "#4aad72",
            draft: "#c4a255",
            frozen: "#5b82cc",
            deprecated: "#cc5b5b",
          }[s] || "#c4a255"
        );
      }

      // ── Tree building ────────────────────────────────────────────────────────────

      const byKey = new Map(FEATURES.map((f) => [f.featureKey, f]));

      function getChildren(key) {
        return FEATURES.filter((f) => f.lineage && f.lineage.parent === key);
      }

      function isRoot(f) {
        const p = f.lineage && f.lineage.parent;
        return !p || !byKey.has(p);
      }

      /** Flatten feature + its descendants with depth info */
      function flatten(f, depth) {
        const result = [{ feature: f, depth }];
        for (const child of getChildren(f.featureKey)) {
          result.push(...flatten(child, depth + 1));
        }
        return result;
      }

      // Group root features by domain
      function buildGroups(features) {
        const roots = features.filter(isRoot);
        const groups = new Map();

        for (const f of roots) {
          const domain = f.domain || "(no domain)";
          if (!groups.has(domain)) groups.set(domain, []);
          groups.get(domain).push(...flatten(f, 0));
        }
        return groups;
      }

      // ── Nav rendering ────────────────────────────────────────────────────────────

      let activeKey = null;
      const collapsedDomains = new Set();

      function renderNav(filterText) {
        const nav = document.getElementById("nav-tree");
        const q = (filterText || "").toLowerCase().trim();

        const features = q
          ? FEATURES.filter(
              (f) =>
                f.featureKey.toLowerCase().includes(q) ||
                f.title.toLowerCase().includes(q) ||
                (f.domain && f.domain.toLowerCase().includes(q)) ||
                (f.tags && f.tags.some((t) => t.toLowerCase().includes(q))),
            )
          : FEATURES;

        if (features.length === 0) {
          nav.innerHTML = '<div class="no-results">No features match</div>';
          return;
        }

        const groups = q
          ? (() => {
              // Flat list when searching
              const m = new Map([
                ["results", features.map((f) => ({ feature: f, depth: 0 }))],
              ]);
              return m;
            })()
          : buildGroups(FEATURES);

        const sortedDomains = [...groups.keys()].sort((a, b) => {
          if (a === "(no domain)") return 1;
          if (b === "(no domain)") return -1;
          return a.localeCompare(b);
        });

        let html = "";
        for (const domain of sortedDomains) {
          const items = groups.get(domain);
          const visible = q
            ? items.filter(
                ({ feature: f }) =>
                  f.featureKey.toLowerCase().includes(q) ||
                  f.title.toLowerCase().includes(q) ||
                  (f.tags && f.tags.some((t) => t.toLowerCase().includes(q))),
              )
            : items;
          if (visible.length === 0) continue;

          const isCollapsed = !q && collapsedDomains.has(domain);
          const label = domain === "results" ? "results" : domain;

          html += `<div class="nav-group${isCollapsed ? " collapsed" : ""}" data-domain="${esc(domain)}">
  <div class="nav-domain${isCollapsed ? " collapsed" : ""}" onclick="toggleDomain(this)">
    <span class="nav-domain-arrow">▾</span>
    <span>${esc(label)}</span>
    <span class="nav-domain-count">${visible.length}</span>
  </div>
  <div class="nav-group-items">`;

          for (const { feature: f, depth } of visible) {
            const isChild = depth > 0;
            const hasChildren = getChildren(f.featureKey).length > 0;
            html += `<div class="nav-item${f.featureKey === activeKey ? " active" : ""}"
        data-key="${esc(f.featureKey)}"
        data-status="${esc(f.status)}"
        data-depth="${depth}"
        onclick="navigate('${esc(f.featureKey)}')">
        ${isChild ? '<span class="nav-child-arrow">↳</span>' : '<span class="nav-dot"></span>'}
        <span class="nav-item-key">${esc(f.featureKey)}</span>
        <span class="nav-item-title">${esc(f.title)}</span>
        ${hasChildren ? '<span class="nav-child-arrow" style="margin-left:auto;opacity:0.4">⊕</span>' : ""}
      </div>`;
          }

          html += "</div></div>";
        }

        nav.innerHTML = html;
      }

      function toggleDomain(el) {
        const group = el.closest(".nav-group");
        const domain = group.dataset.domain;
        if (collapsedDomains.has(domain)) {
          collapsedDomains.delete(domain);
          group.classList.remove("collapsed");
          el.classList.remove("collapsed");
        } else {
          collapsedDomains.add(domain);
          group.classList.add("collapsed");
          el.classList.add("collapsed");
        }
      }

      // ── Content rendering ────────────────────────────────────────────────────────

      function renderHome() {
        const content = document.getElementById("content");
        const total = FEATURES.length;
        const frozen = FEATURES.filter((f) => f.status === "frozen").length;
        const active = FEATURES.filter((f) => f.status === "active").length;
        const draft = FEATURES.filter((f) => f.status === "draft").length;
        const depr = FEATURES.filter((f) => f.status === "deprecated").length;

        const domains = [
          ...new Set(FEATURES.map((f) => f.domain).filter(Boolean)),
        ].sort();

        const avgCompleteness = FEATURES.length
          ? Math.round(
              FEATURES.reduce((s, f) => s + completeness(f), 0) /
                FEATURES.length,
            )
          : 0;

        content.innerHTML = `<div class="home-page">
  <div class="home-eyebrow">◈ life-as-code wiki</div>
  <div class="home-title">${esc(document.title.replace(" — LAC Wiki", ""))}</div>
  <div class="home-subtitle">${total} feature${total === 1 ? "" : "s"} · avg ${avgCompleteness}% complete</div>

  <div class="stat-row">
    ${active ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#4aad72"></span><span class="stat-pill-num">${active}</span><span class="stat-pill-label">active</span></div>` : ""}
    ${frozen ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#5b82cc"></span><span class="stat-pill-num">${frozen}</span><span class="stat-pill-label">frozen</span></div>` : ""}
    ${draft ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#c4a255"></span><span class="stat-pill-num">${draft}</span><span class="stat-pill-label">draft</span></div>` : ""}
    ${depr ? `<div class="stat-pill"><span class="stat-pill-dot" style="background:#cc5b5b"></span><span class="stat-pill-num">${depr}</span><span class="stat-pill-label">deprecated</span></div>` : ""}
  </div>

  ${
    domains.length
      ? `<div class="home-section-title">Domains</div>
  <div class="domain-chips">
    ${domains.map((d) => `<span class="domain-chip" onclick="filterByDomain('${esc(d)}')">${esc(d)}</span>`).join("")}
  </div>`
      : ""
  }

  <div class="home-section-title">All features</div>
  <div style="display:flex;flex-direction:column;gap:2px;">
    ${FEATURES.map(
      (
        f,
      ) => `<div class="nav-item" data-key="${esc(f.featureKey)}" data-status="${esc(f.status)}" data-depth="0" onclick="navigate('${esc(f.featureKey)}')" style="border-radius:4px;border:1px solid var(--border-soft);margin-bottom:2px;">
      <span class="nav-dot"></span>
      <span class="nav-item-key">${esc(f.featureKey)}</span>
      <span class="nav-item-title">${esc(f.title)}</span>
      <span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text-soft);">${completeness(f)}%</span>
    </div>`,
    ).join("")}
  </div>
</div>`;
      }

      function renderFeature(key) {
        const f = byKey.get(key);
        if (!f) {
          renderHome();
          return;
        }

        const pct = completeness(f);
        const barFill = `<span class="completeness-bar"><span class="completeness-fill" style="width:${pct}%"></span></span>`;

        const children = getChildren(f.featureKey);
        const parent =
          f.lineage && f.lineage.parent && byKey.get(f.lineage.parent);

        let html = `<div class="feature-page">
  <div class="feature-meta">
    <span class="feature-key">${esc(f.featureKey)}</span>
    <span class="badge badge-${esc(f.status)}"><span class="badge-dot" style="background:${statusColor(f.status)}"></span>${esc(f.status)}</span>
    ${f.domain ? `<span class="badge badge-domain">${esc(f.domain)}</span>` : ""}
  </div>
  <div class="feature-title">${esc(f.title)}</div>
  <div class="feature-completeness">${barFill}${pct}% complete</div>`;

        // Problem
        html += section(
          "Problem",
          f.problem
            ? `<div class="section-body">${md(f.problem)}</div>`
            : '<span class="empty">Not documented.</span>',
        );

        // Analysis
        if (f.analysis)
          html += section(
            "Analysis",
            `<div class="section-body">${md(f.analysis)}</div>`,
          );

        // Implementation
        if (f.implementation)
          html += section(
            "Implementation",
            `<div class="section-body">${md(f.implementation)}</div>`,
          );

        // Success Criteria
        if (f.successCriteria)
          html += section(
            "Success Criteria",
            `<div class="section-body">${md(f.successCriteria)}</div>`,
          );

        // Decisions
        if (f.decisions && f.decisions.length) {
          const cards = f.decisions
            .map(
              (d) => `<div class="decision-card">
      <div class="decision-title">${esc(d.decision)}</div>
      <div class="decision-rationale">${md(d.rationale)}</div>
      ${
        d.date || (d.alternativesConsidered && d.alternativesConsidered.length)
          ? `<div class="decision-meta">
        ${d.date ? `<span class="decision-date">📅 ${esc(d.date)}</span>` : ""}
        ${d.alternativesConsidered && d.alternativesConsidered.length ? `<span class="decision-alts">Considered: ${d.alternativesConsidered.map(esc).join(", ")}</span>` : ""}
      </div>`
          : ""
      }
    </div>`,
            )
            .join("");
          html += section(
            "Decisions",
            `<div class="decisions-list">${cards}</div>`,
            f.decisions.length,
          );
        }

        // Known Limitations
        if (f.knownLimitations && f.knownLimitations.length) {
          const items = f.knownLimitations
            .map(
              (l) =>
                `<div class="limitation-item"><span class="limitation-bullet">—</span><span>${md(l)}</span></div>`,
            )
            .join("");
          html += section(
            "Known Limitations",
            `<div class="limitations-list">${items}</div>`,
            f.knownLimitations.length,
          );
        }

        // Tags
        if (f.tags && f.tags.length) {
          const chips = f.tags
            .map((t) => `<span class="tag">${esc(t)}</span>`)
            .join("");
          html += section("Tags", `<div class="tags-row">${chips}</div>`);
        }

        // Lineage
        if (parent || children.length) {
          let lineage = '<div class="lineage-row">';
          if (parent) {
            lineage += `<span class="lineage-arrow">parent ↑</span>
        <a class="lineage-link" onclick="navigate('${esc(parent.featureKey)}')">
          ${esc(parent.featureKey)} — ${esc(parent.title)}
        </a>`;
          }
          if (parent && children.length)
            lineage +=
              '<span class="lineage-arrow" style="margin:0 6px;">·</span>';
          if (children.length) {
            lineage += '<span class="lineage-arrow">children ↓</span>';
            for (const c of children) {
              lineage += `<a class="lineage-link" onclick="navigate('${esc(c.featureKey)}')">
          ${esc(c.featureKey)} — ${esc(c.title)}
        </a>`;
            }
          }
          lineage += "</div>";
          html += section("Lineage", lineage);
        }

        html += "</div>";
        document.getElementById("content").innerHTML = html;
        document.getElementById("content").scrollTop = 0;
      }

      function section(label, body, count) {
        const countHtml =
          count != null ? `<span class="section-count">(${count})</span>` : "";
        return `<div class="section">
  <div class="section-header">
    <span class="section-label">${label}</span>${countHtml}
  </div>
  ${body}
</div>`;
      }

      // ── Navigation ───────────────────────────────────────────────────────────────

      function navigate(key) {
        activeKey = key;
        location.hash = key ? "#" + key : "";
        renderNav(document.getElementById("filter-input").value);
        if (key) {
          renderFeature(key);
          // Scroll nav item into view
          const el = document.querySelector(`.nav-item[data-key="${key}"]`);
          if (el) el.scrollIntoView({ block: "nearest" });
        } else {
          renderHome();
        }
      }

      function filterByDomain(domain) {
        const input = document.getElementById("filter-input");
        input.value = domain;
        renderNav(domain);
      }

      // Filter input
      document.getElementById("filter-input").addEventListener("input", (e) => {
        renderNav(e.target.value);
      });

      // ── Boot ─────────────────────────────────────────────────────────────────────

      const hashKey = location.hash.slice(1);
      if (hashKey && byKey.has(hashKey)) {
        activeKey = hashKey;
        renderNav("");
        renderFeature(hashKey);
        setTimeout(() => {
          const el = document.querySelector(`.nav-item[data-key="${hashKey}"]`);
          if (el) el.scrollIntoView({ block: "nearest" });
        }, 0);
      } else {
        renderNav("");
        renderHome();
      }

      window.navigate = navigate;
      window.toggleDomain = toggleDomain;
      window.filterByDomain = filterByDomain;
    </script>
  </body>
</html>
